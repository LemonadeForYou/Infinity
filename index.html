<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>MCBE Asia · Pro Tier List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #1a1a1a;
            font-family: 'Inter', sans-serif;
            color: #e0e0e0;
            padding: 16px;
            min-height: 100vh;
            background: #1e1e1e;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Minecraft-inspired palette */
        .header-section {
            background: #2d2d2d;
            border-radius: 32px;
            padding: 20px 24px;
            margin-bottom: 24px;
            border: 1px solid #4a4a4a;
            box-shadow: 0 8px 0 #1a1a1a;
        }

        .title-row {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .minecraft-logo {
            font-size: 2rem;
            font-weight: 700;
            color: #4CAF50;
            text-shadow: 3px 3px 0 #2d2d2d;
        }

        .badge {
            background: #4CAF50;
            color: white;
            padding: 6px 16px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid #6fbf73;
        }

        .controls-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .btn {
            background: #3a3a3a;
            border: none;
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            padding: 10px 20px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.1s ease;
            border: 1px solid #5a5a5a;
            box-shadow: 0 4px 0 #1f1f1f;
            font-size: 0.95rem;
        }

        .btn:hover {
            background: #4a4a4a;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #1f1f1f;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #1f1f1f;
        }

        .btn-primary {
            background: #4CAF50;
            border-color: #6fbf73;
            color: white;
            box-shadow: 0 4px 0 #2d6b30;
        }

        /* Tier rows - card style */
        .tier-row {
            background: #2d2d2d;
            border-radius: 28px;
            padding: 16px 20px;
            margin-bottom: 16px;
            border: 1px solid #4a4a4a;
            box-shadow: 0 8px 0 #1f1f1f;
            transition: all 0.15s ease;
        }

        .tier-row:hover {
            border-color: #6fbf73;
        }

        .tier-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 16px;
        }

        .tier-label {
            font-size: 2rem;
            font-weight: 800;
            min-width: 60px;
            text-align: center;
            padding: 8px 0;
            border-radius: 20px;
            background: #3a3a3a;
            border: 2px solid;
            box-shadow: 0 4px 0 #1a1a1a;
        }

        .tier-label.s { border-color: #ffd700; color: #ffd700; text-shadow: 0 2px 0 #8b6f00; }
        .tier-label.a { border-color: #4CAF50; color: #4CAF50; }
        .tier-label.b { border-color: #2196F3; color: #2196F3; }
        .tier-label.c { border-color: #9e9e9e; color: #9e9e9e; }

        .tier-items {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            min-height: 100px;
            padding: 8px;
            background: #262626;
            border-radius: 24px;
            border: 2px dashed #4a4a4a;
            transition: all 0.2s;
        }

        .tier-items.drag-over {
            border-color: #4CAF50;
            background: #2a3a2a;
        }

        /* Item cards - Minecraft style */
        .item-card {
            background: #3a3a3a;
            border-radius: 20px;
            padding: 12px;
            min-width: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            border: 2px solid #5a5a5a;
            box-shadow: 0 6px 0 #1f1f1f;
            cursor: grab;
            transition: all 0.15s ease;
            position: relative;
        }

        .item-card:active {
            cursor: grabbing;
            opacity: 0.9;
            transform: scale(0.98);
            box-shadow: 0 2px 0 #1f1f1f;
        }

        .item-card.dragging {
            opacity: 0.5;
            transform: scale(0.95);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            z-index: 999;
        }

        .item-card:hover {
            border-color: #4CAF50;
            transform: translateY(-4px);
            box-shadow: 0 10px 0 #1f1f1f;
        }

        .item-icon {
            width: 48px;
            height: 48px;
            background: #4a4a4a;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            border: 2px solid #6a6a6a;
        }

        .item-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: #e0e0e0;
            text-align: center;
        }

        .item-country {
            font-size: 0.8rem;
            color: #4CAF50;
            font-weight: 500;
        }

        /* Pool section (unassigned items) */
        .pool-section {
            background: #2d2d2d;
            border-radius: 32px;
            padding: 24px;
            margin-top: 24px;
            border: 1px solid #4a4a4a;
            box-shadow: 0 8px 0 #1f1f1f;
        }

        .pool-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #4CAF50;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .pool-items {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            min-height: 150px;
            background: #262626;
            border-radius: 28px;
            padding: 20px;
            border: 2px dashed #5a5a5a;
        }

        .pool-items .item-card {
            cursor: grab;
        }

        /* Spacing utilities */
        .mt-4 { margin-top: 16px; }
        .mb-2 { margin-bottom: 8px; }
        .p-4 { padding: 16px; }
        .gap-4 { gap: 16px; }

        /* Mobile optimizations */
        @media (max-width: 600px) {
            .tier-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .item-card {
                min-width: 80px;
                padding: 8px;
            }
            
            .item-icon {
                width: 40px;
                height: 40px;
                font-size: 1.5rem;
            }
            
            .item-name {
                font-size: 0.8rem;
            }
            
            .btn {
                padding: 8px 16px;
                font-size: 0.85rem;
            }
            
            .controls-bar {
                justify-content: center;
            }
        }

        /* Empty state */
        .empty-state {
            color: #7a7a7a;
            text-align: center;
            padding: 40px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header with controls -->
        <div class="header-section">
            <div class="title-row">
                <span class="minecraft-logo">⛏️ ASIA MCBE</span>
                <span class="badge"><i class="fas fa-mobile-alt"></i> Mobile Pro Tierlist</span>
                <span class="badge" style="background: #ffd700; color: #1e1e1e;">v2.0</span>
            </div>
            
            <!-- Control buttons -->
            <div class="controls-bar">
                <button class="btn" id="resetBtn"><i class="fas fa-undo-alt"></i> Reset</button>
                <button class="btn" id="saveBtn"><i class="fas fa-camera"></i> Save Image</button>
                <button class="btn btn-primary" id="addTierBtn"><i class="fas fa-plus"></i> Add Tier</button>
                <button class="btn" id="clearBtn"><i class="fas fa-trash"></i> Clear All</button>
            </div>
        </div>

        <!-- Tier Rows (S, A, B, C) -->
        <div id="tierContainer">
            <!-- Tier S -->
            <div class="tier-row" data-tier="S">
                <div class="tier-header">
                    <div class="tier-label s">S</div>
                    <div style="color: #ffd700; font-weight: 600;">ELITE · 14,000+ pts</div>
                </div>
                <div class="tier-items" id="tierS" data-tier="S">
                    <!-- Items will be inserted here -->
                </div>
            </div>

            <!-- Tier A -->
            <div class="tier-row" data-tier="A">
                <div class="tier-header">
                    <div class="tier-label a">A</div>
                    <div style="color: #4CAF50; font-weight: 600;">PRO · 7,500-9,500 pts</div>
                </div>
                <div class="tier-items" id="tierA" data-tier="A"></div>
            </div>

            <!-- Tier B -->
            <div class="tier-row" data-tier="B">
                <div class="tier-header">
                    <div class="tier-label b">B</div>
                    <div style="color: #2196F3; font-weight: 600;">RISING · 3,500-5,000 pts</div>
                </div>
                <div class="tier-items" id="tierB" data-tier="B"></div>
            </div>

            <!-- Tier C -->
            <div class="tier-row" data-tier="C">
                <div class="tier-header">
                    <div class="tier-label c">C</div>
                    <div style="color: #9e9e9e; font-weight: 600;">GRINDER · 900-2,500 pts</div>
                </div>
                <div class="tier-items" id="tierC" data-tier="C"></div>
            </div>
        </div>
        <!-- Player Pool (unassigned) -->
        <div class="pool-section">
            <div class="pool-title">
                <i class="fas fa-users"></i> Player Pool (drag to tiers)
            </div>
            <div class="pool-items" id="playerPool">
                <!-- Player items will be inserted here -->
            </div>
        </div>
    </div>

    <script>
        // Professional drag & drop with smooth animations
        (function() {
            // Player data
            const players = [
                { name: 'iFlick_ID', country: '🇮🇩 ID', points: '12,500', icon: '👑', tier: null },
                { name: 'DinoRice_', country: '🇵🇭 PH', points: '11,980', icon: '⚡', tier: null },
                { name: 'MongGamer', country: '🇹🇭 TH', points: '11,450', icon: '🔥', tier: null },
                { name: 'ZzZian_', country: '🇲🇾 MY', points: '8,200', icon: '🎯', tier: null },
                { name: 'NoobKillerVN', country: '🇻🇳 VN', points: '7,950', icon: '🎮', tier: null },
                { name: 'GoblinSJ', country: '🇸🇬 SG', points: '7,600', icon: '🌀', tier: null },
                { name: 'KiritoIN', country: '🇮🇳 IN', points: '4,220', icon: '🌏', tier: null },
                { name: 'RangerWhite', country: '🇵🇭 PH', points: '3,890', icon: '🌱', tier: null },
                { name: 'Jacky_ID', country: '🇮🇩 ID', points: '3,550', icon: '🌿', tier: null },
                { name: 'MieKuah', country: '🇮🇩 ID', points: '2,100', icon: '📱', tier: null },
                { name: 'ThaiFighterX', country: '🇹🇭 TH', points: '1,980', icon: '📱', tier: null },
                { name: 'Arif_My', country: '🇲🇾 MY', points: '980', icon: '✨', tier: null },
                { name: 'BinHoang', country: '🇻🇳 VN', points: '840', icon: '✨', tier: null }
            ];

            // Initialize drag and drop
            function initDragAndDrop() {
                const items = document.querySelectorAll('.item-card');
                const dropZones = document.querySelectorAll('.tier-items, .pool-items');

                items.forEach(item => {
                    item.addEventListener('dragstart', handleDragStart);
                    item.addEventListener('dragend', handleDragEnd);
                    item.setAttribute('draggable', 'true');
                });

                dropZones.forEach(zone => {
                    zone.addEventListener('dragover', handleDragOver);
                    zone.addEventListener('dragleave', handleDragLeave);
                    zone.addEventListener('drop', handleDrop);
                });
            }

            function handleDragStart(e) {
                e.target.classList.add('dragging');
                e.dataTransfer.setData('text/plain', e.target.id);
                e.dataTransfer.effectAllowed = 'move';
            }

            function handleDragEnd(e) {
                e.target.classList.remove('dragging');
                document.querySelectorAll('.tier-items, .pool-items').forEach(z => {
                    z.classList.remove('drag-over');
                });
            }

            function handleDragOver(e) {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                e.currentTarget.classList.add('drag-over');
            }

            function handleDragLeave(e) {
                e.currentTarget.classList.remove('drag-over');
            }

            function handleDrop(e) {
                e.preventDefault();
                e.currentTarget.classList.remove('drag-over');
                
                const id = e.dataTransfer.getData('text/plain');
                const draggableElement = document.getElementById(id);
                
                if (draggableElement && e.currentTarget !== draggableElement.parentNode) {
                    e.currentTarget.appendChild(draggableElement);
                    
                    // Add smooth animation
                    draggableElement.style.transform = 'scale(0.95)';
                    setTimeout(() => {
                        draggableElement.style.transform = 'scale(1)';
                    }, 100);
                }
            }

            // Render players
            function renderPlayers() {
                const pool = document.getElementById('playerPool');
                pool.innerHTML = '';
                
                players.forEach((player, index) => {
                    const card = createPlayerCard(player, index);
                    pool.appendChild(card);
                });
                
                initDragAndDrop();
            }

            function createPlayerCard(player, index) {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.id = `player-${index}`;
                card.setAttribute('draggable', 'true');
                
                card.innerHTML = `
                    <div class="item-icon">${player.icon}</div>
                    <div class="item-name">${player.name}</div>
                    <div class="item-country">${player.country}</div>
                    <div style="font-size: 0.75rem; color: #aaa;">${player.points} pts</div>
                `;
                
                return card;
            }

            // Control functions
            function resetTiers() {
                const pool = document.getElementById('playerPool');
                const tierS = document.getElementById('tierS');
                const tierA = document.getElementById('tierA');
                const tierB = document.getElementById('tierB');
                const tierC = document.getElementById('tierC');
                
                tierS.innerHTML = '';
                tierA.innerHTML = '';
                tierB.innerHTML = '';
                tierC.innerHTML = '';
                
                renderPlayers();
            }

            function saveAsImage() {
                // Simple save simulation
                alert('📸 Save feature ready! In production, this would capture the tier list as an image.');
            }

            function addNewTier() {
                const tierContainer = document.getElementById('tierContainer');
                const newTier = document.createElement('div');
                newTier.className = 'tier-row';
                newTier.innerHTML = `
                    <div class="tier-header">
                        <div class="tier-label" style="border-color: #9c27b0; color: #9c27b0;">NEW</div>
                        <div style="color: #9c27b0;">CUSTOM TIER</div>
                    </div>
                    <div class="tier-items" data-tier="NEW"></div>
                `;
                tierContainer.appendChild(newTier);
                
                // Initialize drag on new tier
                const newItems = newTier.querySelector('.tier-items');
                newItems.addEventListener('dragover', handleDragOver);
                newItems.addEventListener('dragleave', handleDragLeave);
                newItems.addEventListener('drop', handleDrop);
            }

            function clearAll() {
                if (confirm('Remove all players from tiers?')) {
                    resetTiers();
                }
            }

            // Event listeners
            document.getElementById('resetBtn').addEventListener('click', resetTiers);
            document.getElementById('saveBtn').addEventListener('click', saveAsImage);
            document.getElementById('addTierBtn').addEventListener('click', addNewTier);
            document.getElementById('clearBtn').addEventListener('click', clearAll);

            // Initialize
            renderPlayers();

            // Add touch support for mobile
            if ('ontouchstart' in window) {
                const items = document.querySelectorAll('.item-card');
                items.forEach(item => {
                    item.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        // Simplified touch handling
                    });
                });
            }
        })();
    </script>
</body>
</html>
